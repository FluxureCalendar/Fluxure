# Fluxure self-hosted deployment
# Generated by scripts/install.sh — edit .env to change configuration
#
# Usage:
#   Start:  docker compose up -d
#   Stop:   docker compose down
#   Logs:   docker compose logs -f
#   Update: ./update.sh

services:
  postgres:
    image: postgres:17-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: fluxure
      POSTGRES_USER: fluxure
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fluxure']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    shm_size: 128m
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$REDIS_PASSWORD" ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 128m
    restart: unless-stopped
    networks:
      - internal

  fluxure:
    image: theflyingrat/fluxure:latest
    ports:
      - '${FLUXURE_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      # Constructed from .env vars at compose-up time; visible via docker inspect
      - DATABASE_URL=postgresql://fluxure:${POSTGRES_PASSWORD}@postgres:5432/fluxure
      - DATABASE_SSL=false
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - NODE_ENV=production
      - SELF_HOSTED=true
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: '1.0'
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: bridge
