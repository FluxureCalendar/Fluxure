# Self-hosted all-in-one: nginx (frontend) + API + PostgreSQL + Redis
# Usage: docker compose -f docker-compose.selfhost.yml up -d
#
# Requires: .env file with production values (see .env.example)
# Requires: pre-built web assets in packages/web/build/ (run scripts/selfhost-build.sh first)

services:
  postgres:
    image: postgres:17-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: fluxure
      POSTGRES_USER: fluxure
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fluxure']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - internal

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 128m
    restart: unless-stopped
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://fluxure:${POSTGRES_PASSWORD}@postgres:5432/fluxure
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:3000/api/auth/google/callback}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - TRUST_PROXY=${TRUST_PROXY:-1}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL:-}
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=${NODE_ENV:-production}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    tmpfs:
      - /tmp
    read_only: true
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: '1.0'
    restart: unless-stopped
    networks:
      - internal

  web:
    image: nginx:1.27-alpine
    ports:
      - '${FLUXURE_PORT:-80}:80'
    volumes:
      - ./packages/web/build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    mem_limit: 128m
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
