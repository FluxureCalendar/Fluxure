# Development services — start with: docker compose -f docker-compose.dev.yml up -d
# Redis and Postgres are intentionally passwordless for local development convenience.
# For staging/production, use docker-compose.yml (or docker-compose.selfhost.yml) which
# require passwords via environment variables.
services:
  postgres:
    image: postgres:17-alpine
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: fluxure
      POSTGRES_USER: fluxure
      POSTGRES_PASSWORD: fluxure_dev

  redis:
    image: redis:7-alpine
    ports:
      - '127.0.0.1:6379:6379'

volumes:
  pgdata-dev:
