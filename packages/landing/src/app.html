<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6366F1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#818CF8" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      /* Critical inline CSS — prevents FOUC / white flash */
      :root {
        --color-bg: #fafafa;
        --color-surface: #ffffff;
        --color-text: #09090b;
        --color-text-secondary: #71717a;
        --color-text-tertiary: #a1a1aa;
        --color-accent: #6366f1;
        --color-border: #e4e4e7;
        --font-sans:
          'Geist Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', SFMono-Regular, monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-bg: #0c0c0e;
          --color-surface: #16161a;
          --color-text: #fafafa;
          --color-text-secondary: #a1a1aa;
          --color-text-tertiary: #52525b;
          --color-accent: #818cf8;
          --color-border: #27272a;
        }
      }
      body {
        margin: 0;
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-sans);
      }
      /* Font-display swap for CDN fonts */
      @font-face {
        font-family: 'Geist Sans';
        font-display: swap;
        src: local('Geist Sans');
      }
      @font-face {
        font-family: 'Geist Mono';
        font-display: swap;
        src: local('Geist Mono');
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
