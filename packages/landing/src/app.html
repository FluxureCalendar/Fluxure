<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F6F4" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', t === 'dark' ? '#121110' : '#F7F6F4');
      })();
    </script>
    <style>
      /* Critical inline CSS — prevents FOUC */
      :root {
        --color-bg: #f7f6f4;
        --color-surface: #ffffff;
        --color-text: #2c2a26;
        --color-text-secondary: #6b7b82;
        --color-text-tertiary: #9aa0a4;
        --color-accent: #4a90a4;
        --color-border: #d8d6d0;
      }
      :root[data-theme='dark'] {
        --color-bg: #121110;
        --color-surface: #1c1b19;
        --color-text: #e8e6e3;
        --color-text-secondary: #8fa0a8;
        --color-text-tertiary: #5e686d;
        --color-accent: #6bb5cc;
        --color-border: #2e2d29;
      }
      body {
        margin: 0;
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
      }
      @font-face {
        font-family: 'Fraunces';
        font-display: swap;
        src: local('Fraunces');
      }
      @font-face {
        font-family: 'Inter';
        font-display: swap;
        src: local('Inter');
      }
      @font-face {
        font-family: 'Geist Mono';
        font-display: swap;
        src: local('Geist Mono');
      }
    </style>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fluxure" />
    <meta name="twitter:card" content="summary" />
    <link rel="preconnect" href="https://accounts.google.com" crossorigin />
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
