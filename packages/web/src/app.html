<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6366F1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#818CF8" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <style>
      /* Critical inline CSS — prevents FOUC / white flash */
      :root {
        --color-bg: #fafafa;
        --color-surface: #ffffff;
        --color-text: #09090b;
        --color-text-secondary: #71717a;
        --color-text-tertiary: #a1a1aa;
        --color-accent: #6366f1;
        --color-border: #e4e4e7;
        --font-sans:
          'Geist Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', SFMono-Regular, monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-bg: #0c0c0e;
          --color-surface: #16161a;
          --color-text: #fafafa;
          --color-text-secondary: #a1a1aa;
          --color-text-tertiary: #52525b;
          --color-accent: #818cf8;
          --color-border: #27272a;
        }
      }
      body {
        margin: 0;
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-sans);
      }
      /* Font-display swap for CDN fonts */
      @font-face {
        font-family: 'Geist Sans';
        font-display: swap;
        src: local('Geist Sans');
      }
      @font-face {
        font-family: 'Geist Mono';
        font-display: swap;
        src: local('Geist Mono');
      }
      /* App shell — shown until SvelteKit hydrates */
      .loading-shell {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: var(--color-bg);
        color: var(--color-text-tertiary);
        font-family: var(--font-sans);
        font-size: 0.875rem;
        gap: 8px;
      }
      .loading-shell-spinner {
        width: 18px;
        height: 18px;
        border: 2px solid var(--color-border);
        border-top-color: var(--color-accent);
        border-radius: 50%;
        animation: shell-spin 0.6s linear infinite;
      }
      @keyframes shell-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .loading-shell-spinner {
          animation: none;
        }
      }
      body.hydrated .loading-shell {
        display: none;
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div class="loading-shell" aria-hidden="true">
      <div class="loading-shell-spinner"></div>
      <span>Loading Fluxure...</span>
    </div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
