<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F8FA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0C1418" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://accounts.google.com" crossorigin />
    <link rel="preconnect" href="https://js.stripe.com" crossorigin />
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    <link rel="dns-prefetch" href="https://js.stripe.com" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <style>
      /* Critical inline CSS — prevents FOUC / white flash */
      :root {
        --color-bg: #f5f8fa;
        --color-surface: #fefffe;
        --color-text: #1e2d35;
        --color-text-secondary: #5b7b8a;
        --color-text-tertiary: #6b8898;
        --color-accent: #3d8fa4;
        --color-border: #d4dde3;
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme='light']) {
          --color-bg: #0c1418;
          --color-surface: #141e24;
          --color-text: #e0eaf0;
          --color-text-secondary: #7ba0b0;
          --color-text-tertiary: #6a8898;
          --color-accent: #5cb8d0;
          --color-border: #1e3040;
        }
      }
      :root[data-theme='dark'] {
        --color-bg: #0c1418;
        --color-surface: #141e24;
        --color-text: #e0eaf0;
        --color-text-secondary: #7ba0b0;
        --color-text-tertiary: #6a8898;
        --color-accent: #5cb8d0;
        --color-border: #1e3040;
      }
      body {
        margin: 0;
        background-color: var(--color-bg);
        color: var(--color-text);
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
      }
      /* Font-display swap */
      @font-face {
        font-family: 'Fraunces';
        font-display: swap;
        src: local('Fraunces');
      }
      @font-face {
        font-family: 'Inter';
        font-display: swap;
        src: local('Inter');
      }
      @font-face {
        font-family: 'Geist Mono';
        font-display: swap;
        src: local('Geist Mono');
      }
      /* Loading shell — shown until SvelteKit hydrates */
      .loading-shell {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--color-bg);
        color: var(--color-text-secondary);
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        font-size: 0.875rem;
        z-index: 99999;
        transition:
          opacity 300ms ease,
          visibility 300ms ease;
      }
      .loading-shell-text {
        animation: loadingPulse 2s ease-in-out infinite;
      }
      @keyframes loadingPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .loading-shell-text {
          animation: none;
          opacity: 1;
        }
        .loading-shell {
          transition: none;
        }
      }
      body.hydrated .loading-shell {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>
    <script>
      // Apply saved theme before paint to prevent flash
      (function () {
        var t = localStorage.getItem('fluxure-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div class="loading-shell" aria-hidden="true">
      <span class="loading-shell-text">Loading...</span>
    </div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
